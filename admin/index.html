<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Administrace — Školní magazín</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Tell search engines not to index this page -->
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Admin-only layout — inherits palette/typography from style.css */
    body { background: var(--content-bg); }

    /* IMPORTANT: the [hidden] attribute must always win, otherwise the
       display:grid on .login-screen below would keep the login overlay
       visible even after a successful login. */
    [hidden] { display: none !important; }
    .admin-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px clamp(20px, 4vw, 48px) 80px;
    }
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; margin-bottom: 32px;
    }
    .admin-header h1 { margin: 0; font-size: clamp(1.6rem, 3vw, 2rem); }
    .admin-header .admin-meta { color: var(--muted); font-size: 0.9rem; }

    .dashboard {
      display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr);
      gap: 40px; align-items: start;
    }
    @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; gap: 32px; } }

    .panel {
      background: var(--surface); border: 1px solid var(--content-rule);
      border-radius: 4px; padding: 24px;
    }
    .panel h2 {
      margin: 0 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--content-rule);
      font-size: 1.1rem; font-weight: 600;
    }

    .form-grid { display: flex; flex-direction: column; gap: 14px; }
    .form-grid label {
      display: flex; flex-direction: column; gap: 6px;
      font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--content-fg);
    }
    .form-grid input[type="text"],
    .form-grid input[type="url"],
    .form-grid input[type="date"],
    .form-grid input[type="file"],
    .form-grid select,
    .form-grid textarea {
      min-height: 40px; padding: 8px 12px;
      border: 1px solid var(--content-rule); border-radius: 2px;
      background: var(--surface); color: var(--content-fg);
      font: inherit; font-size: 1rem; text-transform: none; letter-spacing: 0;
    }
    .form-grid textarea { min-height: 160px; resize: vertical; line-height: 1.5; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
    .help { color: var(--muted); font-size: 0.78rem; font-style: italic; text-transform: none; letter-spacing: 0; }

    .image-preview {
      margin-top: 4px; width: 100%; max-width: 220px;
      aspect-ratio: 16 / 10;
      background: #eaeaea center / cover no-repeat;
      border: 1px solid var(--content-rule); border-radius: 2px;
    }
    .image-preview[hidden] { display: none; }

    .form-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }

    .table-wrap { overflow-x: auto; }
    .article-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; min-width: 480px; }
    .article-table th, .article-table td {
      text-align: left; padding: 12px 10px; vertical-align: top;
      border-bottom: 1px solid var(--content-rule);
    }
    .article-table th {
      font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
      border-bottom: 1px solid var(--accent);
    }
    .article-table .thumb {
      display: block; width: 64px; height: 48px;
      background: #eaeaea center / cover no-repeat;
      border: 1px solid var(--content-rule); border-radius: 2px;
    }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .row-actions button {
      min-height: 30px; padding: 0 10px;
      border: 1px solid var(--accent); background: var(--surface); color: var(--content-fg);
      font-size: 0.72rem; border-radius: 2px;
    }
    .row-actions button:hover { background: var(--accent); color: #fff; }
    .row-actions button.danger:hover { background: #b00020; border-color: #b00020; color: #fff; }
    .empty-row td { color: var(--muted); text-align: center; font-style: italic; padding: 28px 10px; }

    /* Login screen */
    .login-screen {
      min-height: 100vh;
      display: grid; place-items: center;
      padding: 24px;
    }
    .login-card {
      width: min(420px, 100%);
      background: var(--surface); border: 1px solid var(--content-rule);
      border-radius: 4px; padding: 32px;
    }
    .login-card h1 { margin: 0 0 6px; font-size: 1.4rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .login-card p { margin: 0 0 18px; color: var(--muted); font-size: 0.9rem; }
    .login-card form { display: flex; flex-direction: column; gap: 12px; }
    .login-card input {
      min-height: 42px; padding: 8px 12px;
      border: 1px solid var(--content-rule); border-radius: 2px;
      background: var(--surface); color: var(--content-fg);
      font: inherit;
    }
    .login-card .error { margin: 0; color: #b00020; font-size: 0.88rem; min-height: 1em; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 20px; background: var(--accent); color: #fff;
      font-size: 0.88rem; letter-spacing: 0.04em; border-radius: 2px;
      opacity: 0; pointer-events: none; transition: opacity 180ms ease; z-index: 60;
    }
    .toast.is-visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- ============================================================
       LOGIN SCREEN (shown until authenticated)
       ============================================================ -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <h1>Administrace</h1>
      <p>Pro vstup zadejte heslo administrátora.</p>
      <form id="login-form" autocomplete="off">
        <input id="login-password" type="password" placeholder="Heslo" autocomplete="current-password" required>
        <p class="error" id="login-error" aria-live="polite"></p>
        <button class="btn" type="submit">Přihlásit se</button>
      </form>
    </div>
  </div>

  <!-- ============================================================
       DASHBOARD (shown after login)
       ============================================================ -->
  <div class="admin-shell" id="admin-shell" hidden>
    <header class="admin-header">
      <div>
        <h1>Správa příspěvků</h1>
        <p class="admin-meta">Vanaheim · Školní magazín</p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <a class="btn btn-ghost" href="/">Zobrazit web</a>
        <button class="btn btn-ghost" type="button" id="logout-btn">Odhlásit</button>
      </div>
    </header>

    <div class="dashboard">
      <!-- ===== Form ===== -->
      <section class="panel">
        <h2 id="form-title">Nový příspěvek</h2>
        <form class="form-grid" id="article-form" autocomplete="off">
          <input type="hidden" id="f-id">

          <label>Název
            <input type="text" id="f-title" required maxlength="200">
          </label>

          <label>Tělo / Obsah článku
            <textarea id="f-body" placeholder="Text příspěvku…"></textarea>
          </label>

          <label>Obrázek (URL nebo nahrát soubor)
            <input type="url" id="f-image-url" placeholder="https://...">
            <input type="file" id="f-image-file" accept="image/*">
            <span class="help">Nahraný soubor se uloží do Vercel Blob. URL má přednost, pokud je vyplněna.</span>
            <span class="image-preview" id="image-preview" hidden></span>
          </label>

          <div class="field-row">
            <label>Autor / Autoři (čárkou oddělené)
              <input type="text" id="f-authors" placeholder="Anna Nováková">
            </label>
            <label>Datum
              <input type="date" id="f-date">
            </label>
          </div>

          <div class="field-row">
            <label>Štítky (čárkou oddělené)
              <input type="text" id="f-tags" placeholder="Komiks, Humor">
            </label>
            <label>Typ
              <select id="f-kind">
                <option value="article">Článek</option>
                <option value="comic">Komiks</option>
              </select>
            </label>
          </div>

          <div class="form-actions">
            <button class="btn" type="submit" id="submit-btn">Vytvořit</button>
            <button class="btn btn-ghost" type="button" id="reset-btn">Vyčistit</button>
          </div>
        </form>
      </section>

      <!-- ===== Table ===== -->
      <section class="panel">
        <h2>Seznam příspěvků</h2>
        <div class="table-wrap">
          <table class="article-table">
            <thead>
              <tr>
                <th></th><th>Název</th><th>Autor</th><th>Datum</th><th>Akce</th>
              </tr>
            </thead>
            <tbody id="article-tbody">
              <tr class="empty-row"><td colspan="5">Načítám…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/admin/admin.js"></script>
</body>
</html>
