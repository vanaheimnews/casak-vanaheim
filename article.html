<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Školní magazín — článek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  <style>
    /* Page-specific overrides — keeps the design system from style.css. */
    .article-page { max-width: 760px; }
    .article-hero {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #eaeaea;
      border: 1px solid var(--content-rule);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      margin-bottom: 24px;
    }
    .article-hero img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .article-title { font-size: clamp(1.8rem, 3.4vw, 2.4rem); margin: 0 0 12px; line-height: 1.2; }
    .article-meta {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      color: var(--muted); font-size: 0.92rem; margin-bottom: 24px;
    }
    .article-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
    .article-body { font-size: 1.05rem; line-height: 1.7; }
    .article-body p { margin: 0 0 1em; white-space: pre-wrap; }
    .article-back {
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 24px;
      color: var(--muted); text-decoration: none; font-size: 0.9rem;
    }
    .article-back:hover { color: var(--content-fg); }
    .loading-state, .error-state {
      padding: 40px; text-align: center; color: var(--muted);
      border: 1px dashed var(--content-rule); border-radius: 4px;
      background: var(--surface);
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Přejít k obsahu</a>

  <!-- ===== Header (same layout as index) ===== -->
  <header class="site-header" id="sidebar">
    <div class="header-top">
      <svg class="header-divider" width="100%" height="220" aria-hidden="true" focusable="false">
        <path class="hd-line" d="M4000 110 L480 110 L394 24 L0 24" vector-effect="non-scaling-stroke"/>
        <path class="hd-line" d="M480 110 L394 196 L0 196" vector-effect="non-scaling-stroke"/>
      </svg>
      <a class="site-logo" href="./#home" aria-label="Vanaheim News — domů">
        <img src="/logo.png" alt="Vanaheim News — By Expediční Střední ScioŠkola">
      </a>
      <nav class="site-nav" aria-label="Hlavní navigace">
        <a href="./#home"     class="nav-link">Domů</a>
        <a href="./#articles" class="nav-link">Příspěvky</a>
        <a href="./#about"    class="nav-link">O nás</a>
        <a href="./#contact"  class="nav-link">Kontakt</a>
      </nav>
      <button class="burger" id="burger" type="button"
              aria-controls="sidebar" aria-expanded="false" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>
  <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

  <main id="main" class="content">
    <article class="page is-active article-page" id="article-root">
      <a class="article-back" href="./#articles">← Zpět na příspěvky</a>
      <p class="loading-state" id="loading">Načítám článek…</p>
    </article>
  </main>

  <script>
    /* Reuse only the burger/drawer logic from the main script. */
    (function () {
      var sidebar = document.querySelector("#sidebar");
      var burger = document.querySelector("#burger");
      var backdrop = document.querySelector("#sidebar-backdrop");
      function close() {
        sidebar.classList.remove("is-open");
        burger.setAttribute("aria-expanded", "false");
        backdrop.hidden = true;
      }
      burger.addEventListener("click", function () {
        var open = sidebar.classList.contains("is-open");
        if (open) close();
        else {
          sidebar.classList.add("is-open");
          burger.setAttribute("aria-expanded", "true");
          backdrop.hidden = false;
        }
      });
      backdrop.addEventListener("click", close);
      document.addEventListener("keydown", function (e) { if (e.key === "Escape") close(); });
    })();

    /* Article loader. */
    (function () {
      function escapeHtml(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
        });
      }
      function formatDate(iso) {
        if (!iso) return "";
        var d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        var months = ["ledna","února","března","dubna","května","června",
                      "července","srpna","září","října","listopadu","prosince"];
        return d.getDate() + ". " + months[d.getMonth()] + " " + d.getFullYear();
      }

      // Render the visual-editor element layout exactly as authored.
      var CANVAS_W = 820;   // must match the editor canvas width
      function renderElements(wrap, elements) {
        var canvas = document.createElement("div");
        canvas.className = "article-canvas";
        canvas.style.width = CANVAS_W + "px";
        elements.forEach(function (el) {
          var node = document.createElement("div");
          node.className = "ac-el ac-el--" + el.type;
          node.style.left = el.x + "px";
          node.style.top = el.y + "px";
          node.style.width = el.width + "px";
          if (el.height && el.height !== "auto") node.style.height = el.height + "px";
          if (el.type === "image") {
            var img = document.createElement("img");
            img.src = el.content; img.alt = ""; img.loading = "lazy";
            node.appendChild(img);
          } else {
            node.innerHTML = el.content || "";
            var s = el.styles || {};
            node.style.fontSize = s.fontSize || "16px";
            node.style.color = s.color || "#1a1a1a";
            node.style.fontWeight = s.bold ? "700" : "400";
            node.style.fontStyle = s.italic ? "italic" : "normal";
            node.style.textDecoration = s.underline ? "underline" : "none";
            node.style.textAlign = s.align || "left";
          }
          canvas.appendChild(node);
        });
        wrap.innerHTML = "";
        wrap.appendChild(canvas);
        var doScale = function () { scaleCanvas(wrap, canvas); };
        doScale();
        window.addEventListener("resize", doScale);
        // re-scale once images have loaded (their height can change auto rows)
        Array.prototype.forEach.call(canvas.querySelectorAll("img"), function (im) {
          if (!im.complete) im.addEventListener("load", doScale);
        });
      }
      function scaleCanvas(wrap, canvas) {
        canvas.style.transform = "none";
        var h = 0;
        Array.prototype.forEach.call(canvas.children, function (n) {
          var b = n.offsetTop + n.offsetHeight;
          if (b > h) h = b;
        });
        h += 40;
        canvas.style.height = h + "px";
        var avail = wrap.clientWidth || CANVAS_W;
        var scale = Math.min(1, avail / CANVAS_W);
        canvas.style.transformOrigin = "top left";
        canvas.style.transform = "scale(" + scale + ")";
        wrap.style.height = (h * scale) + "px";
      }

      var params = new URLSearchParams(location.search);
      var id = params.get("id");
      var root = document.querySelector("#article-root");

      if (!id) {
        root.innerHTML = '<a class="article-back" href="./#articles">← Zpět na příspěvky</a>' +
                         '<p class="error-state">Chybí ID článku.</p>';
        return;
      }

      fetch("/api/articles?id=" + encodeURIComponent(id))
        .then(function (r) {
          if (!r.ok) throw new Error("Článek nenalezen.");
          return r.json();
        })
        .then(function (a) {
          document.title = (a.title || "Článek") + " — Školní magazín";
          var tagsHtml = (a.tags || []).map(function (t) {
            return '<span class="card-tag">' + escapeHtml(t) + "</span>";
          }).join("");
          var authors = (a.authors || []).join(", ");
          var metaHtml =
            '<a class="article-back" href="./#articles">← Zpět na příspěvky</a>' +
            '<div class="article-meta">' +
              '<time datetime="' + escapeHtml(a.date) + '">' + escapeHtml(formatDate(a.date)) + "</time>" +
              (authors ? "<span>" + escapeHtml(authors) + "</span>" : "") +
              "<span>" + (a.kind === "comic" ? "Komiks" : "Článek") + "</span>" +
            "</div>" +
            (tagsHtml ? '<div class="article-tags">' + tagsHtml + "</div>" : "");

          if (a.elements && a.elements.length) {
            // Render the exact positioned layout from the visual editor.
            root.innerHTML = metaHtml + '<div class="article-canvas-wrap" id="article-canvas-wrap"></div>';
            renderElements(document.querySelector("#article-canvas-wrap"), a.elements);
          } else {
            var heroHtml = a.image
              ? '<div class="article-hero"><img src="' + escapeHtml(a.image) + '" alt=""></div>'
              : "";
            root.innerHTML = metaHtml +
              heroHtml +
              '<h1 class="article-title">' + escapeHtml(a.title) + "</h1>" +
              '<div class="article-body"><p>' + escapeHtml(a.body || "") + "</p></div>";
          }
        })
        .catch(function (err) {
          root.innerHTML = '<a class="article-back" href="./#articles">← Zpět na příspěvky</a>' +
                           '<p class="error-state">' + escapeHtml(err.message || "Chyba při načítání.") + "</p>";
        });
    })();
  </script>
</body>
</html>
